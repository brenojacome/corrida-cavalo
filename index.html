<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏇 Grande Prêmio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --gold: #c9a227;
  --gold-light: #f0c84a;
  --cream: #f5f0e8;
  --green-dark: #1a3a1a;
  --brown-dark: #3a1f14;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Libre Baskerville', serif;
  background: var(--green-dark);
  min-height: 100vh;
  color: var(--cream);
  overflow-x: hidden;
}

/* ═══ HEADER ═══ */
.header {
  background: linear-gradient(180deg, #081508 0%, #1a3a1a 100%);
  border-bottom: 3px solid var(--gold);
  padding: 14px 16px 10px;
  text-align: center;
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.3rem, 5.5vw, 1.9rem);
  font-weight: 900;
  color: var(--gold-light);
  letter-spacing: .08em;
  text-shadow: 0 2px 10px rgba(0,0,0,.7);
}
.header p {
  font-size: .68rem;
  color: rgba(245,240,232,.45);
  letter-spacing: .22em;
  text-transform: uppercase;
  margin-top: 2px;
}

/* ═══ SCREENS ═══ */
.screen { display: none; }
.screen.active { display: block; }

/* ═══ PICK SCREEN ═══ */
#pickScreen { padding: 14px; }
.pick-title {
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  color: var(--gold);
  margin-bottom: 12px;
  letter-spacing: .05em;
}
.horses-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.horse-card {
  background: linear-gradient(160deg, #253a25, #162816);
  border: 2px solid rgba(201,162,39,.25);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: border-color .15s, box-shadow .15s, transform .12s;
}
.horse-card:active { transform: scale(.97); }
.horse-card.selected {
  border-color: var(--gold);
  box-shadow: 0 0 18px rgba(201,162,39,.5);
}
.horse-card .num {
  position: absolute; top: 6px; left: 6px; z-index: 3;
  background: var(--gold);
  color: var(--brown-dark);
  font-family: 'Playfair Display', serif;
  font-weight: 900; font-size: .85rem;
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.horse-img {
  width: 100%; aspect-ratio: 4/3;
  object-fit: cover; display: block;
  filter: brightness(.88) saturate(1.1);
}
.horse-fallback {
  width: 100%; aspect-ratio: 4/3;
  display: none; align-items: center; justify-content: center;
  font-size: 2.8rem; background: #1a2e1a;
}
.horse-info { padding: 7px 9px; }
.horse-name {
  font-family: 'Playfair Display', serif;
  font-weight: 700; font-size: .82rem; color: var(--cream);
}
.horse-jockey {
  font-size: .63rem; color: rgba(245,240,232,.45);
  font-style: italic; margin-top: 2px;
}
.btn-run {
  display: block; width: 100%;
  margin-top: 16px; padding: 13px;
  background: linear-gradient(135deg, #c9a227, #9a7810);
  color: var(--brown-dark);
  font-family: 'Playfair Display', serif;
  font-weight: 900; font-size: 1.05rem;
  border: none; border-radius: 8px;
  letter-spacing: .07em; cursor: pointer;
  box-shadow: 0 4px 18px rgba(0,0,0,.45);
  transition: opacity .15s;
}
.btn-run:disabled { opacity: .3; cursor: default; }
.btn-run:not(:disabled):active { opacity: .78; }

/* ═══ RACE SCREEN ═══ */
#raceScreen { padding: 10px 0 0; }
.race-status {
  text-align: center;
  font-family: 'Playfair Display', serif;
  color: var(--gold); font-size: .88rem;
  letter-spacing: .06em;
  padding: 0 12px 10px; min-height: 28px;
}

/* ─── TRACK ─── */
#track {
  position: relative;
  width: 100%;
  /* height set by JS */
  background: linear-gradient(180deg,
    #7a5510 0%, #a07830 20%, #8a6520 50%, #9a7228 80%, #7a5510 100%
  );
  border-top: 4px solid #3a1f14;
  border-bottom: 4px solid #3a1f14;
  overflow: visible; /* let runners be visible */
}

/* subtle horizontal grain */
#track::after {
  content: '';
  position: absolute; inset: 0; z-index: 1; pointer-events: none;
  background: repeating-linear-gradient(0deg,
    transparent 0px, transparent 5px,
    rgba(0,0,0,.05) 5px, rgba(0,0,0,.05) 6px
  );
}

.lane-sep {
  position: absolute; left: 0; right: 0; height: 1px;
  background: rgba(0,0,0,.22); z-index: 2;
}

/* ─── FINISH LINE ─── */
#finishLine {
  position: absolute; top: 0; bottom: 0; width: 14px; z-index: 10;
  /* checkerboard */
  background:
    conic-gradient(#fff 90deg, #111 90deg 180deg, #fff 180deg 270deg, #111 270deg)
    0 0 / 7px 7px;
  box-shadow: -2px 0 8px rgba(0,0,0,.5), 2px 0 8px rgba(0,0,0,.5);
}
#finishLabel {
  position: absolute; z-index: 11;
  top: 3px;
  font-family: 'Playfair Display', serif;
  font-size: .5rem; color: #fff;
  text-shadow: 0 1px 3px #000;
  letter-spacing: .08em;
  writing-mode: vertical-rl;
}

/* ─── LANE NUMBERS ─── */
.lane-num {
  position: absolute; z-index: 5;
  background: var(--gold); color: var(--brown-dark);
  font-family: 'Playfair Display', serif;
  font-weight: 900; font-size: .65rem;
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  left: 4px;
}

/* ─── PLAYER LANE HIGHLIGHT ─── */
.player-hl {
  position: absolute; left: 0; right: 0;
  background: rgba(201,162,39,.1); z-index: 2;
  pointer-events: none;
}

/* ─── RUNNER ─── */
.runner {
  position: absolute;
  z-index: 8;
  display: flex; align-items: flex-end; gap: 2px;
  pointer-events: none;
  /* left & top managed by JS */
}
.runner-emoji { font-size: 2.1rem; line-height: 1; display: block; }
.runner-tag {
  background: var(--gold); color: var(--brown-dark);
  font-family: 'Playfair Display', serif;
  font-weight: 900; font-size: .5rem;
  width: 14px; height: 14px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 3px; flex-shrink: 0;
}

/* ═══ COUNTDOWN OVERLAY ═══ */
#cdOverlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.8);
  align-items: center; justify-content: center; z-index: 200;
}
#cdOverlay.on { display: flex; }
#cdNum {
  font-family: 'Playfair Display', serif;
  font-size: min(34vw, 170px); font-weight: 900;
  color: var(--gold-light);
  text-shadow: 0 0 60px rgba(240,200,74,.8);
}
@keyframes cdAnim {
  0%   { transform: scale(1.8); opacity: 0; }
  30%  { transform: scale(1);   opacity: 1; }
  75%  { transform: scale(1);   opacity: 1; }
  100% { transform: scale(.4);  opacity: 0; }
}
.cdPop { animation: cdAnim .88s ease-out both; }

/* ═══ RESULT SCREEN ═══ */
#resultScreen { padding: 22px 16px 30px; text-align: center; }
.res-trophy { font-size: 3.4rem; margin-bottom: 6px; }
.res-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem; font-weight: 900;
  color: var(--gold-light); margin-bottom: 8px;
}
.res-photo {
  width: 110px; height: 78px; margin: 0 auto 10px;
  border-radius: 8px; overflow: hidden;
  border: 3px solid var(--gold);
  box-shadow: 0 0 22px rgba(201,162,39,.45);
  display: flex; align-items: center; justify-content: center;
}
.res-photo img { width: 100%; height: 100%; object-fit: cover; }
.res-winner { font-family: 'Playfair Display', serif; font-size: 1.15rem; margin-bottom: 4px; }
.res-msg { font-size: .8rem; color: rgba(245,240,232,.6); font-style: italic; margin-bottom: 18px; }
.podium { max-width: 240px; margin: 0 auto 20px; }
.pod-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0; border-bottom: 1px solid rgba(201,162,39,.13);
  font-size: .8rem; color: rgba(245,240,232,.75);
}
.pod-pos {
  font-family: 'Playfair Display', serif; font-weight: 700;
  color: var(--gold); width: 26px; text-align: right; flex-shrink: 0;
}
.you-pill {
  background: var(--gold); color: var(--brown-dark);
  font-size: .58rem; font-weight: 700;
  padding: 1px 5px; border-radius: 4px;
}
.btn-again {
  padding: 13px 30px;
  background: linear-gradient(135deg, #c9a227, #9a7810);
  color: var(--brown-dark);
  font-family: 'Playfair Display', serif;
  font-weight: 900; font-size: 1rem;
  border: none; border-radius: 8px;
  cursor: pointer; letter-spacing: .06em;
  box-shadow: 0 4px 16px rgba(0,0,0,.35);
}
.btn-again:active { opacity: .8; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>🏇 GRANDE PRÊMIO</h1>
  <p>Hipódromo Virtual · Rio de Janeiro</p>
</div>

<!-- PICK SCREEN -->
<div id="pickScreen" class="screen active">
  <p class="pick-title">Escolha o seu cavalo</p>
  <div class="horses-grid" id="horsesGrid"></div>
  <button class="btn-run" id="btnRun" disabled onclick="onClickRun()">▶ APOSTAR &amp; CORRER</button>
</div>

<!-- RACE SCREEN -->
<div id="raceScreen" class="screen">
  <div class="race-status" id="raceStatus">Preparando…</div>
  <div id="track"></div>
</div>

<!-- RESULT SCREEN -->
<div id="resultScreen" class="screen"></div>

<!-- COUNTDOWN OVERLAY -->
<div id="cdOverlay"><span id="cdNum"></span></div>

<script>
/* ══════════════════════════════════════
   CONSTANTS & DATA
══════════════════════════════════════ */
const LANE_H   = 70;   // px per lane
const RUNNER_W = 52;   // px width of runner
const RUNNER_H = 36;   // px height of runner
const START_X  = 26;   // px: initial left position of runner

const HORSES = [
  { id:1, name:"Trovão Negro",  jockey:"M. Silva",
    emoji:"🐴",
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Collier%2C_The_Finish_of_the_Epsom_Grand_Stand_Association_Cup.jpg/320px-Collier%2C_The_Finish_of_the_Epsom_Grand_Stand_Association_Cup.jpg" },
  { id:2, name:"Estrela do Sul", jockey:"R. Costa",
    emoji:"🐎",
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Howdju_Doo_and_other_horses_racing.jpg/320px-Howdju_Doo_and_other_horses_racing.jpg" },
  { id:3, name:"Ventania Real",  jockey:"C. Mendes",
    emoji:"🏇",
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Horse_racing_Cheltenham_Festival_2006.jpg/320px-Horse_racing_Cheltenham_Festival_2006.jpg" },
  { id:4, name:"Raio de Ouro",  jockey:"L. Barbosa",
    emoji:"⚡",
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Jockeys.jpg/320px-Jockeys.jpg" }
];

let selected    = null;
let raf         = null;
let finishOrder = [];

/* ══════════════════════════════════════
   PICK SCREEN
══════════════════════════════════════ */
function buildPick() {
  selected = null;
  document.getElementById('btnRun').disabled = true;
  const grid = document.getElementById('horsesGrid');
  grid.innerHTML = '';

  HORSES.forEach(h => {
    const card = document.createElement('div');
    card.className = 'horse-card';
    card.dataset.id = h.id;
    card.innerHTML = `
      <div class="num">${h.id}</div>
      <img class="horse-img" src="${h.img}" alt="${h.name}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="horse-fallback">${h.emoji}</div>
      <div class="horse-info">
        <div class="horse-name">${h.name}</div>
        <div class="horse-jockey">Nº${h.id} · Jockey: ${h.jockey}</div>
      </div>`;
    card.onclick = () => pickHorse(h.id);
    grid.appendChild(card);
  });
}

function pickHorse(id) {
  selected = id;
  document.querySelectorAll('.horse-card').forEach(c =>
    c.classList.toggle('selected', +c.dataset.id === id)
  );
  document.getElementById('btnRun').disabled = false;
}

/* ══════════════════════════════════════
   SCREEN SWITCHING
══════════════════════════════════════ */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ══════════════════════════════════════
   COUNTDOWN
══════════════════════════════════════ */
function onClickRun() {
  show('raceScreen');
  buildTrack();
  doCountdown(3, () => {
    document.getElementById('cdOverlay').classList.remove('on');
    startRace();
  });
}

function doCountdown(n, done) {
  const overlay = document.getElementById('cdOverlay');
  const el      = document.getElementById('cdNum');
  overlay.classList.add('on');

  function tick(val) {
    // Remove & re-add to re-trigger CSS animation
    el.className = '';
    void el.offsetWidth; // reflow
    el.textContent = val === 0 ? 'JÁ!' : String(val);
    el.className = 'cdPop';

    if (val === 0) {
      setTimeout(done, 820);
    } else {
      setTimeout(() => tick(val - 1), 900);
    }
  }
  tick(n);
}

/* ══════════════════════════════════════
   BUILD TRACK DOM
══════════════════════════════════════ */
function buildTrack() {
  const track = document.getElementById('track');
  track.innerHTML = '';

  const totalH = HORSES.length * LANE_H;
  track.style.height = totalH + 'px';

  // Player lane highlight
  const playerIdx = HORSES.findIndex(h => h.id === selected);
  if (playerIdx >= 0) {
    const hl = document.createElement('div');
    hl.className = 'player-hl';
    hl.style.top    = (playerIdx * LANE_H) + 'px';
    hl.style.height = LANE_H + 'px';
    track.appendChild(hl);
  }

  HORSES.forEach((h, i) => {
    // Lane separator
    if (i > 0) {
      const sep = document.createElement('div');
      sep.className = 'lane-sep';
      sep.style.top = (i * LANE_H) + 'px';
      track.appendChild(sep);
    }

    // Lane number badge
    const lbl = document.createElement('div');
    lbl.className = 'lane-num';
    lbl.style.top = (i * LANE_H + (LANE_H - 18) / 2) + 'px';
    lbl.textContent = h.id;
    track.appendChild(lbl);

    // Runner — starts at left edge
    const runner = document.createElement('div');
    runner.className = 'runner';
    runner.id = 'runner_' + h.id;
    runner.style.left   = START_X + 'px';
    runner.style.top    = (i * LANE_H + (LANE_H - RUNNER_H) / 2) + 'px';
    runner.style.width  = RUNNER_W + 'px';
    runner.style.height = RUNNER_H + 'px';
    runner.innerHTML = `<span class="runner-emoji">${h.emoji}</span><div class="runner-tag">${h.id}</div>`;
    track.appendChild(runner);
  });

  // Finish line — 20px from right
  const trackW = track.getBoundingClientRect().width || window.innerWidth;
  const flLeft = trackW - 20 - 14; // 20px margin, 14px wide

  const fl = document.createElement('div');
  fl.id = 'finishLine';
  fl.style.left = flLeft + 'px';
  track.appendChild(fl);

  const flLbl = document.createElement('div');
  flLbl.id = 'finishLabel';
  flLbl.style.left = (flLeft + 16) + 'px';
  flLbl.textContent = 'CHEGADA';
  track.appendChild(flLbl);
}

/* ══════════════════════════════════════
   RACE ENGINE
══════════════════════════════════════ */
function startRace() {
  document.getElementById('raceStatus').textContent = 'Eles estão correndo! 🏇';
  finishOrder = [];

  const track  = document.getElementById('track');
  const trackW = track.getBoundingClientRect().width || window.innerWidth;

  // finishX: the left value (in px) at which the runner's LEFT edge
  // reaches the finish line (left edge of finish strip).
  // Finish line left edge = trackW - 20 - 14
  const finishLineLeft = trackW - 20 - 14;
  // Runner reaches finish when its RIGHT edge (left + RUNNER_W) hits the line
  const finishX = finishLineLeft - RUNNER_W; // runner.left value at finish

  // Per-horse state
  const state = {};
  HORSES.forEach(h => {
    state[h.id] = {
      x:     0,                              // offset from START_X (px)
      speed: 1.5 + Math.random() * 2.5,     // px per frame (~60fps)
      phase: Math.random() * Math.PI * 2,   // gallop bounce phase
      done:  false
    };
  });

  function frame() {
    let anyAlive = false;

    HORSES.forEach(h => {
      const s = state[h.id];
      if (s.done) return;
      anyAlive = true;

      // Advance position
      s.x += s.speed + (Math.random() - 0.5) * 0.6;

      // Vertical gallop bounce
      s.phase += 0.3;
      const bounceY = Math.sin(s.phase) * 4.5;

      const runner = document.getElementById('runner_' + h.id);
      if (!runner) return;

      const i       = HORSES.findIndex(x => x.id === h.id);
      const baseTop = i * LANE_H + (LANE_H - RUNNER_H) / 2;

      if (s.x >= finishX) {
        // Clamp to finish
        s.x    = finishX;
        s.done = true;
        finishOrder.push(h.id);

        runner.style.left = (START_X + s.x) + 'px';
        runner.style.top  = baseTop + 'px';

        // Gold glow for winner
        if (finishOrder.length === 1) {
          runner.style.filter = 'drop-shadow(0 0 8px gold) drop-shadow(0 0 16px gold)';
        }
      } else {
        runner.style.left = (START_X + s.x) + 'px';
        runner.style.top  = (baseTop + bounceY) + 'px';
      }
    });

    if (anyAlive) {
      raf = requestAnimationFrame(frame);
    } else {
      setTimeout(showResult, 700);
    }
  }

  raf = requestAnimationFrame(frame);
}

/* ══════════════════════════════════════
   RESULT
══════════════════════════════════════ */
function showResult() {
  const winnerId = finishOrder[0];
  const winner   = HORSES.find(h => h.id === winnerId);
  const myHorse  = HORSES.find(h => h.id === selected);
  const iWon     = winnerId === selected;
  const medals   = ['🥇','🥈','🥉','4º'];

  document.getElementById('resultScreen').innerHTML = `
    <div class="res-trophy">${iWon ? '🏆' : '🎽'}</div>
    <div class="res-title">${iWon ? 'VOCÊ GANHOU!' : 'FIM DE CORRIDA!'}</div>
    <div class="res-photo">
      <img src="${winner.img}" alt="${winner.name}"
           onerror="this.outerHTML='<span style=font-size:2.5rem>${winner.emoji}</span>'">
    </div>
    <div class="res-winner">${winner.emoji} ${winner.name}</div>
    <div class="res-msg">${iWon
      ? 'Seu cavalo cruzou primeiro a linha de chegada. Parabéns!'
      : `Você apostou em ${myHorse.name}, mas ${winner.name} foi o mais rápido hoje.`
    }</div>
    <div class="podium">
      ${finishOrder.map((id,i) => {
        const h = HORSES.find(x => x.id === id);
        return `<div class="pod-row">
          <span class="pod-pos">${medals[i]}</span>
          <span>${h.emoji} ${h.name}</span>
          ${id === selected ? '<span class="you-pill">VOCÊ</span>' : ''}
        </div>`;
      }).join('')}
    </div>
    <button class="btn-again" onclick="restart()">🔄 NOVA CORRIDA</button>
  `;

  show('resultScreen');
}

/* ══════════════════════════════════════
   RESTART
══════════════════════════════════════ */
function restart() {
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  buildPick();
  show('pickScreen');
}

/* ══ INIT ══ */
buildPick();
</script>
</body>
</html>
